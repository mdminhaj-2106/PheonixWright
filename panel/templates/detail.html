{% extends "base.html" %}
{% block content %}
<div style="margin-bottom: 20px;">
    <h2 id="profile-name" aria-label="Managed Profile Name">{{ user.name }}</h2>
    <p aria-label="Identity String Address">Identity String: <strong>{{ user.email }}</strong></p>
    <p>Provisioned on: {{ user.created_at }}</p>
</div>

<div style="border: 1px solid #000; padding: 20px;">
    <h3>Modify Authorizations</h3>
    <form method="post" action="/users/{{ user.id }}/update" id="update-form">
        
        <div class="form-group">
            <label for="seat-assignment" class="form-label">Seat Assignment</label>
            <select name="license" id="seat-assignment" aria-label="Seat Assignment Dropdown">
                {% for l in licenses %}
                <option value="{{ l }}" {% if l == user.license %}selected{% endif %}>{{ l }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="credential-reset" class="form-label">Credential Reset</label>
            <input name="password" id="credential-reset" type="text" aria-label="Credential Reset Field" placeholder="Leave blank to maintain current credentials">
        </div>

        <button type="submit" id="commit-changes" aria-label="Commit System Changes button" style="width: 100%;">Commit System Changes</button>
    </form>
</div>

<div style="margin-top: 20px;">
    <a href="/" class="action-link" id="return-directory" aria-label="Return to Directory">&larr; Return to Directory</a>
</div>
{% endblock %}
