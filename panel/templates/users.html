{% extends "base.html" %}
{% block content %}
<h2>Active Directory</h2>
<form method="get" id="search-form" class="form-group" style="display: flex; gap: 10px;">
    <input name="q" id="search-input" aria-label="Search by name or email" value="{{ q }}" placeholder="Search by name or email...">
    <button type="submit" id="search-submit" aria-label="Execute search">Search</button>
</form>

<table id="directory-table" aria-label="User directory results">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>License State</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for u in users %}
        <tr class="user-row" data-user-id="{{ u.id }}">
            <td aria-label="User Name">{{ u.name }}</td>
            <td aria-label="User Email">{{ u.email }}</td>
            <td>
                <span class="badge" aria-label="Current License: {{ u.license }}">
                    {{ u.license }}
                </span>
            </td>
            <td><a href="/users/{{ u.id }}" class="action-link" aria-label="Manage user {{ u.name }}" id="manage-link-{{ u.id }}">Manage</a></td>
        </tr>
        {% endfor %}
        {% if not users %}
        <tr>
            <td colspan="4" style="text-align: center;" aria-label="No results">
                No identities found matching your query.
            </td>
        </tr>
        {% endif %}
    </tbody>
</table>
{% endblock %}
